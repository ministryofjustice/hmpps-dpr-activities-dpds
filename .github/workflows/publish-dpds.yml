name: Publish DPDs

on:
  workflow_dispatch:
    inputs:
      deployEnv:
        description: "The environment to deploy DPDs to"
        required: true
        default: development
        type: choice
        options:
          - development
          - test
          - preproduction
          - production

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish DPDs to ${{ inputs.deployEnv }} env
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployEnv }}

    env:
      SCHEMA_LOCATION: "${{ github.workspace }}/schema.json"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # Validation
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@79b9f7c4bd0d3cb85d4f7a289a515a666d38322e

      - run: npm ci --ignore-scripts

      - name: Download schema
        run: |
          curl --fail --silent --show-error \
            https://raw.githubusercontent.com/ministryofjustice/hmpps-digital-prison-reporting-data-product-definitions-schema/main/schema/1.0.0/data-product-definition-schema.json \
            -o "$SCHEMA_LOCATION"

      - name: Validate DPDs against schema
        run: npm run validate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:role/dpr-dpd-s3-publisher-activities-${{ inputs.deployEnv }}
          aws-region: eu-west-2

      - name: Upload DPDs
        run: |
          aws s3 sync definitions/ \
            s3://dpr-data-product-definitions-${{ inputs.deployEnv }}/activities/
